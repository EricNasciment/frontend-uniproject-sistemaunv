name: Deploy em Produção (Firebase Hosting)

on:
  push:
    branches: ["main"]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Fazer checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: Criar arquivo .env a partir do secret FIREBASE_CONFIG
        run: |
          echo "${{ secrets.FIREBASE_CONFIG }}" > .env

      - name: Gerar build do projeto
        run: npm run build

      - name: Fazer deploy em produção no Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: "${{ secrets.GITHUB_TOKEN }}"
          firebaseServiceAccount: "${{ secrets.FIREBASE_SERVICE_ACCOUNT }}"
          projectId: "unifor-uni-project"
          channelId: live
